<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C·SNA – מעגלי חברים</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ── Tokens ─────────────────────────────────────── */
:root {
  --bg:       #07071a;
  --surf:     rgba(12,12,38,.97);
  --border:   rgba(140,140,240,.2);
  --text:     rgba(225,225,255,.88);
  --muted:    rgba(200,200,255,.38);
  --accent:   #7b7eff;
  --c1:       #ff6b6b;
  --c2:       #ffb347;
  --c3:       #74b9ff;
  --hdr:      52px;
}

/* ── Reset ──────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;height:100vh}
button{cursor:pointer;font-family:inherit}
input,select{font-family:inherit}

/* ── Header ─────────────────────────────────────── */
#hdr{
  position:fixed;top:0;right:0;left:0;height:var(--hdr);
  background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;padding:0 14px;z-index:200;
}
#logo{font-size:15px;font-weight:700;color:var(--accent);letter-spacing:.06em;white-space:nowrap}

.sep{width:1px;height:24px;background:var(--border);flex-shrink:0}

.hbtn{
  background:rgba(123,126,255,.13);border:1px solid var(--border);
  color:var(--accent);padding:5px 11px;border-radius:6px;font-size:12px;
  white-space:nowrap;transition:background .15s
}
.hbtn:hover{background:rgba(123,126,255,.28)}
#file-input{display:none}

/* filters */
#filters{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
.fl{font-size:11px;color:var(--muted);white-space:nowrap}
#fg{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);padding:4px 8px;border-radius:6px;font-size:12px;outline:none
}
#fg option{background:#111133}
.fcb-wrap{display:flex;gap:4px}
.fcb{
  width:26px;height:26px;border-radius:50%;border:1.5px solid;
  background:transparent;font-size:11px;font-weight:700;transition:all .15s
}
.fcb[data-c="1"]{border-color:var(--c1);color:var(--c1)}
.fcb[data-c="2"]{border-color:var(--c2);color:var(--c2)}
.fcb[data-c="3"]{border-color:var(--c3);color:var(--c3)}
.fcb.on[data-c="1"]{background:var(--c1);color:#111}
.fcb.on[data-c="2"]{background:var(--c2);color:#111}
.fcb.on[data-c="3"]{background:var(--c3);color:#111}
#fsearch{
  background:rgba(255,255,255,.06);border:1px solid var(--border);
  color:var(--text);padding:4px 10px;border-radius:6px;font-size:12px;
  outline:none;width:110px
}
#fsearch::placeholder{color:var(--muted)}

/* view toggle */
.vtog{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-right:auto}
.vbtn{
  padding:5px 12px;font-size:12px;background:transparent;border:none;
  color:var(--muted);transition:all .15s
}
.vbtn.on{background:rgba(123,126,255,.22);color:var(--accent)}

#btnExport{
  background:rgba(37,211,102,.1);border:1px solid rgba(37,211,102,.3);
  color:#25d366;padding:5px 11px;border-radius:6px;font-size:12px;
  white-space:nowrap;transition:background .15s
}
#btnExport:hover{background:rgba(37,211,102,.22)}

/* ── Graph view ─────────────────────────────────── */
#gview{position:fixed;top:var(--hdr);left:0;right:0;bottom:0}
svg{width:100%;height:100%}

.hull{stroke-width:1.5}
.lnk{stroke-opacity:.38}
.node circle{transition:opacity .25s,filter .12s;cursor:pointer}
.node circle:hover{filter:brightness(1.5)}
.node text{
  text-anchor:middle;dominant-baseline:middle;
  pointer-events:none;font-family:Arial,sans-serif
}
.node.dim circle{opacity:.1}
.node.dim text{opacity:.08}
.lnk.dim{stroke-opacity:.05}

.hl-g rect{rx:10;ry:10}
.hl-g text{pointer-events:none}

/* ── Table view ─────────────────────────────────── */
#tview{
  display:none;position:fixed;top:var(--hdr);left:0;right:0;bottom:0;
  overflow-y:auto;padding:18px
}
#tview::-webkit-scrollbar{width:5px}
#tview::-webkit-scrollbar-thumb{background:rgba(140,140,240,.3);border-radius:3px}

.tbar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
#btnAdd{
  background:rgba(123,126,255,.13);border:1px solid var(--border);
  color:var(--accent);padding:6px 14px;border-radius:6px;font-size:13px
}
#btnAdd:hover{background:rgba(123,126,255,.28)}
#rowCount{font-size:12px;color:var(--muted)}

table{width:100%;border-collapse:collapse}
th{
  padding:7px 10px;font-size:10px;letter-spacing:.07em;
  color:var(--muted);border-bottom:1px solid var(--border);
  text-align:right;white-space:nowrap
}
td{padding:4px 6px;border-bottom:1px solid rgba(140,140,240,.08)}

.ci{
  background:rgba(255,255,255,.05);border:1px solid transparent;
  color:var(--text);padding:5px 8px;border-radius:5px;
  font-size:13px;width:100%;outline:none;transition:border-color .15s
}
.ci:focus{border-color:var(--accent);background:rgba(255,255,255,.09)}

.cs{
  background:rgba(255,255,255,.05);border:1px solid transparent;
  color:var(--text);padding:5px 6px;border-radius:5px;
  font-size:13px;outline:none;cursor:pointer;width:100%
}
.cs:focus{border-color:var(--accent)}
.cs option{background:#111133}

.wa-sm{
  display:inline-flex;align-items:center;justify-content:center;
  background:#25d366;border:none;color:#fff;
  width:30px;height:30px;border-radius:50%;font-size:14px;
  text-decoration:none;transition:background .15s;flex-shrink:0
}
.wa-sm:hover{background:#1cb254}

.del{
  background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.28);
  color:#e74c3c;width:28px;height:28px;border-radius:5px;font-size:16px;
  display:inline-flex;align-items:center;justify-content:center
}
.del:hover{background:rgba(231,76,60,.28)}

/* ── Panel ──────────────────────────────────────── */
#panel{
  position:fixed;top:var(--hdr);right:0;
  width:268px;height:calc(100vh - var(--hdr));
  background:var(--surf);border-left:1px solid var(--border);
  padding:22px 18px 18px;
  transform:translateX(110%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  z-index:150;display:flex;flex-direction:column;gap:0
}
#panel.open{transform:translateX(0)}
#pClose{
  position:absolute;top:10px;left:12px;
  background:none;border:none;color:var(--muted);font-size:24px;line-height:1
}
#pClose:hover{color:#fff}
#pName{font-size:24px;color:#fff;margin-bottom:4px}
#pGtag{
  display:inline-block;font-size:11px;padding:2px 9px;
  border-radius:10px;margin-bottom:16px
}
.ps{font-size:10px;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
.dots{display:flex;gap:6px;margin-bottom:16px}
.dot{width:11px;height:11px;border-radius:50%}
#pPhone{
  font-size:15px;color:#8ecfff;direction:ltr;
  text-align:right;display:block;margin-bottom:20px
}
.wabtn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  background:#25d366;color:#fff;border:none;padding:11px;
  border-radius:22px;font-size:14px;text-decoration:none;
  transition:background .15s
}
.wabtn:hover{background:#1cb254}

/* ── Legend ─────────────────────────────────────── */
#legend{
  position:fixed;bottom:16px;left:16px;
  background:var(--surf);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;font-size:12px;z-index:100
}
.leg{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.leg:last-child{margin-bottom:0}
.ldot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Center pulse ───────────────────────────────── */
.cpulse{animation:cpulse 3s ease-in-out infinite;transform-origin:center}
@keyframes cpulse{0%,100%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.1)}}
</style>
</head>
<body>

<!-- Header -->
<div id="hdr">
  <span id="logo">C · SNA</span>
  <div class="sep"></div>

  <button class="hbtn" id="btnLoad">📂 טעינת קובץ</button>
  <input type="file" id="file-input" accept=".txt,.csv">

  <div class="sep"></div>

  <div id="filters">

<!-- Table -->

<!-- Side panel -->
<div id="panel">

  <a class="wabtn" id="pWa" href="#" target="_blank">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="white" style="flex-shrink:0">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
      <path d="M12 0C5.373 0 0 5.373 0 12c0 2.125.558 4.12 1.533 5.849L.054 23.25a.75.75 0 00.921.921l5.4-1.479A11.952 11.952 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75a9.712 9.712 0 01-5.003-1.384l-.36-.214-3.733 1.021 1.021-3.733-.214-.36A9.712 9.712 0 012.25 12C2.25 6.615 6.615 2.25 12 2.25S21.75 6.615 21.75 12 17.385 21.75 12 21.75z"/>

    שלח הודעה בוואטסאפ

<!-- Legend -->
<div id="legend">
  <div class="leg"><div class="ldot" style="background:var(--c1)"></div>קרוב מאוד</div>
  <div class="leg"><div class="ldot" style="background:var(--c2)"></div>קרוב</div>
  <div class="leg"><div class="ldot" style="background:var(--c3)"></div>מכר</div>
</div>

<script>
// ══════════════════════════════════════════════════
// CONSTANTS
// ══════════════════════════════════════════════════
const GM = {
  best:      {label:"חברים קרובים",  color:"#a29bfe", bg:"rgba(162,155,254,.09)", sk:"rgba(162,155,254,.32)"},
  work:      {label:"עבודה",          color:"#00cec9", bg:"rgba(0,206,201,.08)",   sk:"rgba(0,206,201,.28)" },
  school:    {label:"בית ספר",        color:"#fdcb6e", bg:"rgba(253,203,110,.08)", sk:"rgba(253,203,110,.28)"},
  family:    {label:"משפחה",          color:"#ff7675", bg:"rgba(255,118,117,.08)", sk:"rgba(255,118,117,.28)"},
  neighbors: {label:"שכנים",          color:"#55efc4", bg:"rgba(85,239,196,.08)",  sk:"rgba(85,239,196,.28)" },
  other:     {label:"אחר",            color:"#b2bec3", bg:"rgba(178,190,195,.08)", sk:"rgba(178,190,195,.28)"},
};
const gm = g => GM[g] || {label:g, color:"#b2bec3", bg:"rgba(178,190,195,.08)", sk:"rgba(178,190,195,.28)"};

const CC = {0:"#ffffff", 1:"#ff6b6b", 2:"#ffb347", 3:"#74b9ff"};

const SAMPLE = `owner:צחי
# שם|קבוצה|קרבה|טלפון
דני|best|1|050-111-2233
מיכה|best|1|052-333-4455
יוסי|best|2|053-555-6677
שרה|work|2|054-111-9900
אלי|work|3|055-222-8811
רינה|work|2|056-333-7722
בני|work|3|057-444-6633
ערן|work|3|058-555-5544
גלי|school|2|050-666-4400
תמר|school|2|052-777-3311
אורי|school|3|053-888-2222
ניר|school|3|054-999-1133
אמא|family|1|050-100-2000
אבא|family|1|050-200-3000
נועה|family|1|052-300-4000
יובל|family|2|053-400-5000`;

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let nodes = [], links = [];
let activeC  = new Set([1,2,3]);
let activeGr = "";
let searchQ  = "";
let view     = "graph";

// ══════════════════════════════════════════════════
// PARSER
// ══════════════════════════════════════════════════
function parseTXT(txt) {
  const lines = txt.split(/\r?\n/).map(l=>l.trim()).filter(l=>l&&!l.startsWith('#'));
  let owner = "אני";
  const contacts = [];
  for (const l of lines) {
    if (/^owner:/i.test(l)) { owner = l.slice(6).trim(); continue; }
    const [name,group,cls,phone] = l.split('|').map(p=>p.trim());
    if (!name||!group) continue;
    const c = parseInt(cls)||3;
    contacts.push({id:name, group:group.toLowerCase(), closeness:c,
      phone:phone||"", r: c===1?17 : c===2?14 : 12});
  }
  return [{id:owner, group:"center", closeness:0, phone:null, r:26}, ...contacts];
}

// ══════════════════════════════════════════════════
// LINK GENERATOR
// ══════════════════════════════════════════════════
function genLinks(ns) {
  const ls = [];
  const owner = ns.find(n=>n.group==="center");
  if (!owner) return ls;
  const contacts = ns.filter(n=>n.group!=="center");

  // hub: owner → all
  contacts.forEach(c => ls.push({source:owner.id, target:c.id, kind:"hub", w:4-c.closeness}));

  // within group
  const byG = {};
  contacts.forEach(c=>{(byG[c.group]||(byG[c.group]=[])).push(c)});
  Object.values(byG).forEach(ms=>{
    for(let i=0;i<ms.length;i++)
      for(let j=i+1;j<ms.length;j++) {
        const minC = Math.min(ms[i].closeness,ms[j].closeness);
        if(minC<=2||ms.length<=4) ls.push({source:ms[i].id,target:ms[j].id,kind:"peer",w:2});
      }
  });

  // cross-group: closeness-1 members bridge groups
  const gks = Object.keys(byG);
  const c1g = {};
  gks.forEach(g=>{c1g[g]=byG[g].filter(m=>m.closeness===1)});
  for(let i=0;i<gks.length;i++)
    for(let j=i+1;j<gks.length;j++)
      if(c1g[gks[i]].length&&c1g[gks[j]].length)
        ls.push({source:c1g[gks[i]][0].id,target:c1g[gks[j]][0].id,kind:"cross",w:1});

  return ls;
}

// ══════════════════════════════════════════════════
// FILTER
// ══════════════════════════════════════════════════
function visSet() {
  const q = searchQ.toLowerCase();
  return new Set(nodes.filter(n=>
    n.group==="center" || (
      activeC.has(n.closeness) &&
      (!activeGr || n.group===activeGr) &&
      (!q || n.id.includes(q))
    )
  ).map(n=>n.id));
}

// ══════════════════════════════════════════════════
// D3 GRAPH
// ══════════════════════════════════════════════════
const svg    = d3.select("#graph");
const gview  = document.getElementById("gview");
let W = gview.clientWidth, H = gview.clientHeight;

// glow filters
const defs = svg.append("defs");
const mkGlow = (id,blur)=>{
  const f=defs.append("filter").attr("id",id)
    .attr("x","-60%").attr("y","-60%").attr("width","220%").attr("height","220%");
  f.append("feGaussianBlur").attr("stdDeviation",blur).attr("result","b");
  const m=f.append("feMerge");
  m.append("feMergeNode").attr("in","b");
  m.append("feMergeNode").attr("in","SourceGraphic");
};
mkGlow("gn",3); mkGlow("gc",9);

const root = svg.append("g");
svg.call(d3.zoom().scaleExtent([.3,4]).on("zoom",e=>root.attr("transform",e.transform)));

let hullSel, hlSel, lnkSel, nodSel, sim;
const hullLine = d3.line().curve(d3.curveCatmullRomClosed.alpha(.5));

function gcPos() {
  const gs = [...new Set(nodes.filter(n=>n.group!=="center").map(n=>n.group))];
  const n=gs.length, cx=W/2, cy=H/2, r=Math.min(W,H)*.31;
  const pos={center:{x:cx,y:cy}};
  gs.forEach((g,i)=>{
    const a=(i/n)*2*Math.PI-Math.PI/2;
    pos[g]={x:cx+r*Math.cos(a), y:cy+r*Math.sin(a)};
  });
  return pos;
}

function buildGraph() {
  root.selectAll("*").remove();
  if(!nodes.length) return;
  const pos = gcPos();
  const groups = [...new Set(nodes.filter(n=>n.group!=="center").map(n=>n.group))];

  sim = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d=>d.id)
      .distance(d=>d.kind==="hub"?60+(3-(d.w||1))*28:d.kind==="peer"?52:160)
      .strength(d=>d.kind==="hub"?.22:d.kind==="peer"?.15:.08))
    .force("charge", d3.forceManyBody().strength(-270))
    .force("col",    d3.forceCollide(d=>d.r+13))
    .force("x", d3.forceX(d=>(pos[d.group]||pos.center).x).strength(.2))
    .force("y", d3.forceY(d=>(pos[d.group]||pos.center).y).strength(.2));

  // ── Hulls (group blobs) ──────────────────────────
  hullSel = root.append("g").selectAll("path").data(groups).join("path")
    .attr("class","hull")
    .attr("fill",  g=>gm(g).bg)
    .attr("stroke",g=>gm(g).sk)
    .attr("stroke-width",1.5);

  // ── Hull labels ──────────────────────────────────
  const hlG = root.append("g");
  hlSel = hlG.selectAll(".hl-g").data(groups).join("g").attr("class","hl-g");

  hlSel.append("rect").attr("height",22)
    .attr("fill",  g=>gm(g).bg)
    .attr("stroke",g=>gm(g).sk)
    .attr("stroke-width",1);

  hlSel.append("text")
    .text(g=>gm(g).label)
    .attr("fill",g=>gm(g).color)
    .attr("font-size","11.5px").attr("font-family","Arial,sans-serif")
    .attr("font-weight","600").attr("text-anchor","middle")
    .attr("dominant-baseline","middle").attr("y",11);

  // measure & size rects
  hlSel.each(function(){
    let tw=80;
    try{ tw=d3.select(this).select("text").node().getBBox().width; }catch(e){}
    d3.select(this).select("rect").attr("width",tw+20).attr("x",-(tw+20)/2).attr("rx",11).attr("ry",11);
  });

  // ── Links ────────────────────────────────────────
  lnkSel = root.append("g").selectAll("line").data(links).join("line")
    .attr("class","lnk")
    .attr("stroke", d=>{
      const sid=typeof d.source==="object"?d.source.id:d.source;
      const tid=typeof d.target==="object"?d.target.id:d.target;
      const sn=nodes.find(n=>n.id===sid), tn=nodes.find(n=>n.id===tid);
      const m=Math.min(sn?.closeness??3,tn?.closeness??3);
      return m<=1?"rgba(255,107,107,.6)":m<=2?"rgba(255,179,71,.48)":"rgba(116,185,255,.3)";
    })
    .attr("stroke-width",d=>d.kind==="peer"?1.2:d.kind==="hub"?1:.7);

  // ── Nodes ────────────────────────────────────────
  nodSel = root.append("g").selectAll("g").data(nodes).join("g")
    .attr("class","node")
    .call(d3.drag()
      .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(.3).restart();d.fx=d.x;d.fy=d.y})
      .on("drag", (e,d)=>{d.fx=e.x;d.fy=e.y})
      .on("end",  (e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}))
    .on("click",(_,d)=>{if(d.group!=="center")openPanel(d)});

  nodSel.filter(d=>d.group==="center")
    .append("circle").attr("class","cpulse")
    .attr("r",40).attr("fill","none")
    .attr("stroke","rgba(255,255,255,.18)").attr("stroke-width",2);

  nodSel.append("circle")
    .attr("r",d=>d.r)
    .attr("fill",d=>{
      if(d.group==="center") return "rgba(255,255,255,.1)";
      const c=CC[d.closeness];
      return d.closeness===1?c+"cc":d.closeness===2?c+"88":c+"44";
    })
    .attr("stroke",d=>d.group==="center"?"#fff":CC[d.closeness])
    .attr("stroke-width",d=>d.group==="center"?2:1.5)
    .attr("filter",d=>d.group==="center"?"url(#gc)":"url(#gn)");

  nodSel.append("text")
    .text(d=>d.id)
    .style("font-size",d=>d.group==="center"?"14px":"11px")
    .style("font-weight",d=>d.group==="center"?"600":"400")
    .style("fill","rgba(255,255,255,.9)");

  sim.on("tick",tick);
  applyFilter();
}

function tick() {
  lnkSel
    .attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
    .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodSel.attr("transform",d=>`translate(${d.x},${d.y})`);

  // build position map by group
  const byG = {};
  nodes.filter(n=>n.group!=="center"&&n.x!=null).forEach(n=>{
    (byG[n.group]||(byG[n.group]=[])).push([n.x,n.y]);
  });

  // update hull paths
  hullSel.attr("d",g=>{
    let pts=[...(byG[g]||[])];
    if(pts.length<1) return null;
    if(pts.length===1) return null;
    if(pts.length===2){
      const mx=(pts[0][0]+pts[1][0])/2,my=(pts[0][1]+pts[1][1])/2;
      const dx=pts[1][0]-pts[0][0],dy=pts[1][1]-pts[0][1];
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      pts.push([mx-dy/len*28,my+dx/len*28],[mx+dy/len*28,my-dx/len*28]);
    }
    const h=d3.polygonHull(pts); if(!h) return null;
    const [cx,cy]=d3.polygonCentroid(h);
    const pad=h.map(p=>{
      const dx=p[0]-cx,dy=p[1]-cy,d=Math.sqrt(dx*dx+dy*dy)||1;
      return[p[0]+dx/d*34,p[1]+dy/d*34];
    });
    return hullLine(pad);
  });

  // update hull label positions
  hlSel.attr("transform",g=>{
    const pts=byG[g];
    if(!pts||!pts.length) return "translate(-9999,-9999)";
    const cx=pts.reduce((s,p)=>s+p[0],0)/pts.length;
    const minY=Math.min(...pts.map(p=>p[1]));
    return `translate(${cx},${Math.max(18,minY-46)})`;
  });
}

function applyFilter() {
  if(!nodSel) return;
  const vis=visSet();
  nodSel.classed("dim", d=>!vis.has(d.id));
  if(lnkSel) lnkSel.classed("dim",d=>{
    const si=typeof d.source==="object"?d.source.id:d.source;
    const ti=typeof d.target==="object"?d.target.id:d.target;
    return !vis.has(si)||!vis.has(ti);
  });
  if(hullSel) hullSel.attr("opacity",g=>{
    const ms=nodes.filter(n=>n.group===g);
    return ms.some(n=>vis.has(n.id))?1:.08;
  });
}

// ══════════════════════════════════════════════════
// TABLE VIEW
// ══════════════════════════════════════════════════
function buildTable() {
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  const vis=visSet();
  const contacts=nodes.filter(n=>n.group!=="center");
  let shown=0;

  contacts.forEach(d=>{
    if(!vis.has(d.id)) return;
    shown++;
    const tr=document.createElement("tr");
    tr.dataset.id=d.id;
    tr.innerHTML=`
<td><input class="ci" value="${xe(d.id)}" data-f="id"></td>
<td>${mkGSel(d.group)}</td>
<td>${mkCSel(d.closeness)}</td>
<td><input class="ci" value="${xe(d.phone||"")}" data-f="phone" style="direction:ltr;text-align:right"></td>
<td style="text-align:center">${mkWA(d)}</td>
<td><button class="del" data-id="${xe(d.id)}" onclick="delRow(this)">×</button></td>`;
    tbody.appendChild(tr);
  });

  tbody.querySelectorAll(".ci,.cs").forEach(el=>el.addEventListener("change",syncRow));
  document.getElementById("rowCount").textContent=
    shown===contacts.length?`${contacts.length} חברים`:`${shown} מתוך ${contacts.length}`;
}

const xe=s=>String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;");

function mkGSel(val){
  return`<select class="cs" data-f="group">${
    Object.entries(GM).map(([k,v])=>`<option value="${k}"${val===k?" selected":""}>${v.label}</option>`).join("")
  }</select>`;
}
function mkCSel(val){
  return`<select class="cs" data-f="closeness">
<option value="1"${val===1?" selected":""}>1 – קרוב מאוד</option>
<option value="2"${val===2?" selected":""}>2 – קרוב</option>
<option value="3"${val===3?" selected":""}>3 – מכר</option>
</select>`;
}
function mkWA(d){
  if(!d.phone) return"";
  const n=d.phone.replace(/\D/g,"").replace(/^0/,"972");
  const m=encodeURIComponent(`היי ${d.id}! מה נשמע?`);
  return`<a class="wa-sm" href="https://wa.me/${n}?text=${m}" target="_blank">💬</a>`;
}

function syncRow(e){
  const tr=e.target.closest("tr"); if(!tr) return;
  const node=nodes.find(n=>n.id===tr.dataset.id); if(!node) return;
  const f=e.target.dataset.f, v=e.target.value.trim();
  if(f==="id"){ node.id=v; tr.dataset.id=v; }
  if(f==="group")    node.group=v;
  if(f==="closeness"){node.closeness=parseInt(v); node.r=v==="1"?17:v==="2"?14:12;}
  if(f==="phone")    node.phone=v;
  links=genLinks(nodes);
}

function delRow(btn){
  const id=btn.dataset.id;
  nodes=nodes.filter(n=>n.id!==id);
  links=genLinks(nodes);
  btn.closest("tr").remove();
  if(view==="graph") buildGraph();
  else buildTable();
}

document.getElementById("btnAdd").addEventListener("click",()=>{
  nodes.push({id:"חבר חדש",group:"other",closeness:3,phone:"",r:12});
  links=genLinks(nodes);
  buildTable();
  if(view==="graph") buildGraph();
  const rows=document.querySelectorAll("#tbody tr");
  rows[rows.length-1]?.querySelector(".ci")?.focus();
});

// ══════════════════════════════════════════════════
// PANEL
// ══════════════════════════════════════════════════
function openPanel(d){
  document.getElementById("pName").textContent=d.id;
  const m=gm(d.group);
  const tag=document.getElementById("pGtag");
  tag.textContent=m.label;
  tag.style.cssText=`background:${m.bg};color:${m.color};border:1px solid ${m.sk}`;

  const dc=document.getElementById("pDots"); dc.innerHTML="";
  const filled=4-d.closeness, col=CC[d.closeness];
  for(let i=1;i<=3;i++){
    const el=document.createElement("div"); el.className="dot";
    el.style.background=i<=filled?col:"rgba(255,255,255,.15)";
    el.style.boxShadow =i<=filled?`0 0 5px ${col}55`:"none";
    dc.appendChild(el);
  }

  document.getElementById("pPhone").textContent=d.phone||"—";
  const wa=document.getElementById("pWa");
  if(d.phone){
    const n=d.phone.replace(/\D/g,"").replace(/^0/,"972");
    wa.href=`https://wa.me/${n}?text=${encodeURIComponent(`היי ${d.id}! מה נשמע?`)}`;
    wa.style.display="flex";
  } else { wa.style.display="none"; }

  document.getElementById("panel").classList.add("open");
}
function closePanel(){ document.getElementById("panel").classList.remove("open"); }

// ══════════════════════════════════════════════════
// LOAD / EXPORT
// ══════════════════════════════════════════════════
function loadData(txt){
  nodes=parseTXT(txt);
  links=genLinks(nodes);
  updateGFilter();
  closePanel();
  if(view==="graph") buildGraph(); else buildTable();
}

function updateGFilter(){
  const sel=document.getElementById("fg");
  const gs=[...new Set(nodes.filter(n=>n.group!=="center").map(n=>n.group))];
  sel.innerHTML=`<option value="">הכל</option>`+
    gs.map(g=>`<option value="${g}"${activeGr===g?" selected":""}>${gm(g).label}</option>`).join("");
}

document.getElementById("btnLoad").addEventListener("click",()=>document.getElementById("file-input").click());
document.getElementById("file-input").addEventListener("change",e=>{
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>loadData(ev.target.result);
  r.readAsText(f,"UTF-8");
  e.target.value="";
});

document.getElementById("btnExport").addEventListener("click",()=>{
  const owner=nodes.find(n=>n.group==="center");
  const lines=[
    `owner:${owner?.id||"אני"}`,
    "# שם|קבוצה|קרבה|טלפון",
    ...nodes.filter(n=>n.group!=="center").map(c=>`${c.id}|${c.group}|${c.closeness}|${c.phone||""}`)
  ];
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob([lines.join("\n")],{type:"text/plain;charset=utf-8"}));
  a.download="contacts.txt"; a.click();
});

// ══════════════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════════════
document.getElementById("fg").addEventListener("change",e=>{
  activeGr=e.target.value;
  applyFilter();
  if(view==="table") buildTable();
});

document.querySelectorAll(".fcb").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const c=parseInt(btn.dataset.c);
    if(activeC.has(c)){activeC.delete(c);btn.classList.remove("on")}
    else              {activeC.add(c);   btn.classList.add("on")}
    applyFilter();
    if(view==="table") buildTable();
  });
});

document.getElementById("fsearch").addEventListener("input",e=>{
  searchQ=e.target.value;
  applyFilter();
  if(view==="table") buildTable();
});

// ══════════════════════════════════════════════════
// VIEW TOGGLE
// ══════════════════════════════════════════════════
document.getElementById("btnGV").addEventListener("click",()=>{
  view="graph";
  document.getElementById("gview").style.display="";
  document.getElementById("tview").style.display="none";
  document.getElementById("legend").style.display="";
  document.getElementById("btnGV").classList.add("on");
  document.getElementById("btnTV").classList.remove("on");
  buildGraph();
});
document.getElementById("btnTV").addEventListener("click",()=>{
  view="table";
  document.getElementById("gview").style.display="none";
  document.getElementById("tview").style.display="";
  document.getElementById("legend").style.display="none";
  document.getElementById("btnGV").classList.remove("on");
  document.getElementById("btnTV").classList.add("on");
  closePanel();
  buildTable();
});

// ══════════════════════════════════════════════════
// RESIZE
// ══════════════════════════════════════════════════
window.addEventListener("resize",()=>{
  W=gview.clientWidth; H=gview.clientHeight;
  if(view==="graph"&&sim){
    const pos=gcPos();
    sim.force("x",d3.forceX(d=>(pos[d.group]||pos.center).x).strength(.2));
    sim.force("y",d3.forceY(d=>(pos[d.group]||pos.center).y).strength(.2));
    sim.alpha(.3).restart();
  }
});

// ══════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════
loadData(SAMPLE);
</script>
